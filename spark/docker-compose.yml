version: '3.8'

services:
  spark-thrift:
    build: .
    container_name: spark-thrift
    ports:
      - "10000:10000"
      - "4040:4040"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    volumes:
      - spark-warehouse:/opt/spark/spark-warehouse
      - hive-metastore:/opt/spark/metastore_db
    command: >
      bash -c "/opt/spark/sbin/start-thriftserver.sh
      --master local[*]
      --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
      --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      --conf spark.hadoop.fs.s3a.access.key=${AWS_ACCESS_KEY_ID}
      --conf spark.hadoop.fs.s3a.secret.key=${AWS_SECRET_ACCESS_KEY}
      --conf spark.hadoop.fs.s3a.endpoint=s3.sa-east-1.amazonaws.com
      --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      --conf spark.hadoop.fs.s3a.path.style.access=true
      --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false
      --hiveconf hive.server2.thrift.port=10000
      --hiveconf hive.server2.thrift.bind.host=0.0.0.0 && tail -f /opt/spark/logs/*.out"

volumes:
  spark-warehouse:
  hive-metastore:
